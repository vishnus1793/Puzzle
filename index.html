<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide Puzzle · choose your size</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: linear-gradient(145deg, #1b2b3f 0%, #14222e 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      padding: 1rem;
      margin: 0;
    }

    .puzzle-container {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(4px);
      border-radius: 3rem 3rem 2rem 2rem;
      padding: 1.8rem 1.8rem 2.2rem;
      box-shadow: 0 25px 40px rgba(0, 0, 0, 0.6), inset 0 1px 2px rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: all 0.2s ease;
      max-width: 700px;
      width: 100%;
    }

    h1 {
      text-align: center;
      font-weight: 500;
      letter-spacing: 2px;
      font-size: 2rem;
      color: #d6e6f5;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
      margin-bottom: 0.1rem;
    }

    .subhead {
      text-align: center;
      color: #93b4d4;
      font-weight: 300;
      letter-spacing: 1px;
      margin-top: -0.2rem;
      margin-bottom: 1.2rem;
      font-size: 0.95rem;
      border-bottom: 1px dashed rgba(255, 255, 255, 0.08);
      padding-bottom: 0.6rem;
    }

    /* size selector */
    .size-selector {
      display: flex;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 1.4rem;
      flex-wrap: wrap;
    }

    .size-btn {
      background: #253b4b;
      border: none;
      border-bottom: 3px solid #0d1b26;
      padding: 0.5rem 1.3rem;
      border-radius: 3rem;
      font-weight: 600;
      font-size: 1rem;
      color: #c7dbea;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.3);
      transition: all 0.1s ease;
      cursor: pointer;
      border: 1px solid #3e5f74;
      flex: 0 1 auto;
    }

    .size-btn:hover {
      transform: translateY(-2px);
      background: #2f4a5e;
      border-bottom-width: 4px;
      color: white;
    }

    .size-btn.active {
      background: #4b7b94;
      border-bottom-color: #1e3d4f;
      color: white;
      box-shadow: 0 0 12px #4b7b9466;
      border-color: #80b2cc;
    }

    .grid-wrapper {
      position: relative;
      background: #1f3140;
      border-radius: 2rem;
      padding: 1rem;
      box-shadow: inset 0 8px 12px rgba(0, 0, 0, 0.5), 0 10px 20px rgba(0, 0, 0, 0.3);
      border: 1px solid #3b546b;
    }

    .grid {
      display: grid;
      gap: 8px;
      aspect-ratio: 1 / 1;
      background: #1a2a36;
      border-radius: 1.4rem;
      padding: 6px;
      transition: 0.15s;
      grid-template-columns: repeat(4, 1fr); /* default, overridden by js */
    }

    .tile {
      background: #2e4a5e;
      background-image: radial-gradient(circle at 30% 30%, #4a6f88, #1f3647);
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.6rem;
      font-weight: 600;
      color: #f0f9ff;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
      box-shadow: 0 5px 0 #0c1a24, 0 8px 12px rgba(0, 0, 0, 0.3);
      transition: all 0.08s ease;
      cursor: pointer;
      user-select: none;
      aspect-ratio: 1 / 1;
      border: 1px solid rgba(255, 255, 255, 0.08);
      transform: scale(0.98);
      will-change: transform;
      font-family: 'Segoe UI', monospace;
    }

    .tile:hover:not(.empty) {
      background-image: radial-gradient(circle at 30% 30%, #5f89a8, #28455b);
      transform: scale(1.02);
      box-shadow: 0 3px 0 #0c1a24, 0 10px 18px rgba(0, 0, 0, 0.5);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .tile:active:not(.empty) {
      transform: scale(0.94);
      box-shadow: 0 2px 0 #0c1a24;
    }

    .empty {
      background: #1f2f3b !important;
      background-image: none !important;
      box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.5), 0 0 0 1px #2d4453;
      border: 1px solid #2f4a5a;
      transform: scale(0.92);
      cursor: default;
      color: transparent;
      text-shadow: none;
    }

    .win-state .tile:not(.empty) {
      background: #3d7a5a;
      background-image: radial-gradient(circle at 30% 30%, #62b086, #2b5f41);
      border-color: #7bc09b;
      box-shadow: 0 0 14px #68b58866, 0 5px 0 #1b402b;
    }

    .control-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.8rem;
      margin-top: 1.8rem;
      align-items: center;
    }

    .btn {
      background: #2d4a5e;
      border: none;
      border-bottom: 4px solid #12222e;
      padding: 0.6rem 1.6rem;
      border-radius: 3rem;
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.5px;
      color: #e5eff7;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
      transition: all 0.1s ease;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background-image: linear-gradient(to bottom, #3b5f77, #213b4d);
      flex: 1 1 auto;
      min-width: 90px;
      border: 1px solid #5b7d94;
    }

    .btn:hover {
      transform: translateY(-2px);
      border-bottom-width: 6px;
      background-image: linear-gradient(to bottom, #4e7894, #26455a);
      color: white;
      box-shadow: 0 8px 14px rgba(0, 0, 0, 0.4);
    }

    .btn:active {
      transform: translateY(2px);
      border-bottom-width: 2px;
    }

    .btn-shuffle {
      background-image: linear-gradient(to bottom, #6d4f6b, #452f44);
      border-color: #8f6c8a;
      border-bottom-color: #2f1f2e;
    }

    .btn-shuffle:hover {
      background-image: linear-gradient(to bottom, #8b6588, #543a52);
    }

    .move-counter {
      background: #0f1d28;
      padding: 0.3rem 1.2rem;
      border-radius: 3rem;
      font-size: 1.1rem;
      font-weight: 600;
      color: #bdd9ed;
      border: 1px solid #3b5e74;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      gap: 0.4rem;
      letter-spacing: 1px;
      backdrop-filter: blur(2px);
      white-space: nowrap;
    }

    .move-counter span {
      color: #ffd966;
      font-weight: 700;
      font-size: 1.4rem;
      min-width: 2.4rem;
      text-align: center;
    }

    .message-box {
      margin-top: 1rem;
      text-align: center;
      font-size: 1.05rem;
      font-weight: 500;
      color: #d2e5ff;
      background: #1b3140b3;
      padding: 0.5rem 0.8rem;
      border-radius: 4rem;
      border-left: 3px solid #6b9ac9;
      border-right: 3px solid #6b9ac9;
      backdrop-filter: blur(2px);
      min-height: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
    }

    .footer-note {
      margin-top: 0.8rem;
      color: #648199;
      text-align: center;
      font-size: 0.78rem;
      opacity: 0.7;
      letter-spacing: 0.6px;
    }

    @media (max-width: 480px) {
      .puzzle-container { padding: 0.8rem; }
      .grid-wrapper { padding: 0.4rem; }
      .grid { gap: 4px; padding: 4px; }
      .tile { font-size: 1.8rem; border-radius: 0.8rem; }
      .btn { font-size: 0.8rem; padding: 0.4rem 0.8rem; min-width: 60px; }
      .size-btn { font-size: 0.8rem; padding: 0.3rem 0.9rem; }
      .move-counter { font-size: 0.9rem; padding: 0.2rem 0.8rem; }
      .move-counter span { font-size: 1.2rem; min-width: 2rem; }
    }
  </style>
</head>
<body>
<div class="puzzle-container">
  <h1>🧩 SLIDE · puzzle</h1>
  <div class="subhead">choose grid size &amp; slide tiles</div>

  <!-- size selector -->
  <div class="size-selector" id="sizeSelector">
    <button class="size-btn" data-size="3">3×3</button>
    <button class="size-btn active" data-size="4">4×4</button>
    <button class="size-btn" data-size="5">5×5</button>
  </div>

  <div class="grid-wrapper">
    <div class="grid" id="puzzleGrid"></div>
  </div>

  <div class="control-bar">
    <button class="btn btn-shuffle" id="shuffleBtn">🎲 Shuffle</button>
    <div class="move-counter">🔄 <span id="moveDisplay">0</span></div>
    <button class="btn" id="resetBtn">↺ Reset</button>
  </div>

  <div class="message-box" id="messageBox">✨ arrange numbers in order</div>
  <div class="footer-note">tap tile adjacent to empty space · win by order</div>
</div>

<script>
  (function() {
    // ----- state -----
    let SIZE = 4;               // default 4x4
    let grid = [];
    let emptyRow = 3;
    let emptyCol = 3;
    let moves = 0;
    let isGameWon = false;

    // DOM refs
    const gridEl = document.getElementById('puzzleGrid');
    const moveDisplay = document.getElementById('moveDisplay');
    const messageBox = document.getElementById('messageBox');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const resetBtn = document.getElementById('resetBtn');
    const sizeBtns = document.querySelectorAll('.size-btn');

    // ----- helpers -----
    function createSolvedGrid(size) {
      const arr = [];
      let num = 1;
      for (let r = 0; r < size; r++) {
        const row = [];
        for (let c = 0; c < size; c++) {
          row.push(num++);
        }
        arr.push(row);
      }
      arr[size-1][size-1] = 0;
      return arr;
    }

    function copyGrid(g) {
      return g.map(row => [...row]);
    }

    function isSolved(g) {
      const size = g.length;
      let expected = 1;
      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          if (r === size-1 && c === size-1) {
            return g[r][c] === 0;
          }
          if (g[r][c] !== expected) return false;
          expected++;
        }
      }
      return true;
    }

    function findEmpty(g) {
      for (let r = 0; r < g.length; r++) {
        for (let c = 0; c < g.length; c++) {
          if (g[r][c] === 0) return { row: r, col: c };
        }
      }
      return null;
    }

    // ----- render -----
    function render() {
      const size = SIZE;
      gridEl.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
      gridEl.innerHTML = '';

      const win = isSolved(grid);
      if (win) {
        gridEl.parentElement.classList.add('win-state');
        messageBox.innerHTML = '🎉🎊 Solved!  Perfect! 🎊🎉';
        isGameWon = true;
      } else {
        gridEl.parentElement.classList.remove('win-state');
        isGameWon = false;
        if (!messageBox.innerHTML.includes('🎉')) {
          messageBox.innerHTML = '🧠 slide tiles · arrange in order';
        }
      }

      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          const tile = document.createElement('div');
          const val = grid[r][c];
          tile.className = 'tile';
          if (val === 0) {
            tile.classList.add('empty');
            tile.textContent = '';
          } else {
            tile.textContent = val;
          }
          tile.dataset.row = r;
          tile.dataset.col = c;
          tile.addEventListener('click', tileClickHandler);
          gridEl.appendChild(tile);
        }
      }

      moveDisplay.textContent = moves;

      if (win) {
        messageBox.innerHTML = '🎉🎊 Solved!  Perfect! 🎊🎉';
      }
    }

    // ----- tile click -----
    function tileClickHandler(e) {
      const tile = e.currentTarget;
      const row = parseInt(tile.dataset.row, 10);
      const col = parseInt(tile.dataset.col, 10);
      const val = grid[row][col];
      if (val === 0) return;

      const emptyPos = findEmpty(grid);
      if (!emptyPos) return;
      const { row: eRow, col: eCol } = emptyPos;

      const rowDiff = Math.abs(row - eRow);
      const colDiff = Math.abs(col - eCol);
      const isAdjacent = (rowDiff === 1 && colDiff === 0) || (rowDiff === 0 && colDiff === 1);

      if (!isAdjacent) return;

      // swap
      grid[eRow][eCol] = val;
      grid[row][col] = 0;
      emptyRow = row;
      emptyCol = col;
      moves++;
      render();
    }

    // ----- shuffle (solvable) -----
    function shuffleGrid() {
      grid = createSolvedGrid(SIZE);
      emptyRow = SIZE-1;
      emptyCol = SIZE-1;
      moves = 0;
      isGameWon = false;

      const iterations = 200 + Math.floor(Math.random() * 200);
      let lastMove = -1;
      const dirs = [[-1,0],[1,0],[0,-1],[0,1]];

      for (let i = 0; i < iterations; i++) {
        const possible = [];
        for (let d = 0; d < dirs.length; d++) {
          const [dr, dc] = dirs[d];
          const nr = emptyRow + dr;
          const nc = emptyCol + dc;
          if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE) {
            possible.push(d);
          }
        }
        let chosenDir;
        if (possible.length === 1) {
          chosenDir = possible[0];
        } else {
          let filtered = possible;
          if (lastMove !== -1) {
            const opposite = lastMove ^ 1;
            filtered = possible.filter(d => d !== opposite);
          }
          if (filtered.length === 0) filtered = possible;
          const randomIdx = Math.floor(Math.random() * filtered.length);
          chosenDir = filtered[randomIdx];
        }

        const [dr, dc] = dirs[chosenDir];
        const nr = emptyRow + dr;
        const nc = emptyCol + dc;
        grid[emptyRow][emptyCol] = grid[nr][nc];
        grid[nr][nc] = 0;
        emptyRow = nr;
        emptyCol = nc;
        lastMove = chosenDir;
      }

      // ensure not solved
      if (isSolved(grid)) {
        // swap two adjacent non-empty tiles
        for (let r = 0; r < SIZE; r++) {
          for (let c = 0; c < SIZE; c++) {
            if (grid[r][c] !== 0 && c+1 < SIZE && grid[r][c+1] !== 0) {
              const temp = grid[r][c];
              grid[r][c] = grid[r][c+1];
              grid[r][c+1] = temp;
              const ep = findEmpty(grid);
              if (ep) { emptyRow = ep.row; emptyCol = ep.col; }
              break;
            }
          }
          break;
        }
      }

      const ep = findEmpty(grid);
      if (ep) { emptyRow = ep.row; emptyCol = ep.col; }

      moves = 0;
      render();
      messageBox.innerHTML = '🔄 shuffled · good luck!';
    }

    // ----- reset to solved -----
    function resetToSolved() {
      grid = createSolvedGrid(SIZE);
      emptyRow = SIZE-1;
      emptyCol = SIZE-1;
      moves = 0;
      isGameWon = false;
      render();
      messageBox.innerHTML = '✨ reset to solved · try shuffle';
    }

    // ----- change size -----
    function setSize(newSize) {
      if (newSize === SIZE) {
        // same size: just reset
        resetToSolved();
        return;
      }
      SIZE = newSize;
      grid = createSolvedGrid(SIZE);
      emptyRow = SIZE-1;
      emptyCol = SIZE-1;
      moves = 0;
      isGameWon = false;
      render();
      messageBox.innerHTML = `✨ ${SIZE}×${SIZE} · ready`;
      // update active button
      sizeBtns.forEach(btn => {
        btn.classList.toggle('active', parseInt(btn.dataset.size, 10) === SIZE);
      });
    }

    // ----- init -----
    function init() {
      // set default 4x4
      SIZE = 4;
      grid = createSolvedGrid(SIZE);
      emptyRow = SIZE-1;
      emptyCol = SIZE-1;
      moves = 0;
      isGameWon = false;
      render();
      messageBox.innerHTML = '✨ arrange numbers in order';

      // size buttons
      sizeBtns.forEach(btn => {
        btn.addEventListener('click', function(e) {
          const size = parseInt(this.dataset.size, 10);
          setSize(size);
        });
      });

      shuffleBtn.addEventListener('click', shuffleGrid);
      resetBtn.addEventListener('click', resetToSolved);
    }

    init();
  })();
</script>
</body>
</html>
